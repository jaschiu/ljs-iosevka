name: build fonts
on:
  push:
    branches:
      - master
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      # - name: Run Git LFS
      #   run: git lfs install
      # - name: Install Node.js
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: latest

      - name: Install NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install ttfautohint (Linux)
        uses:  awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f
        with:
          packages: ttfautohint

      - name: Build Font
        run: |
          npm install
          npm run --silent build -- ttf::"$NAME"
          tar -C dist/"$NAME" -I 'zstd -T0 -19' -cf "$NAME".tar.zst .
        env:
          NAME: ${{ matrix.font-name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: "${{ matrix.font-name }}.tar.zst"
          if-no-files-found: error
          retention-days: 90
          archive: false


    strategy:
      # max-parallel: 1
      fail-fast: false
      matrix:
        font-name: ["lj-iosevka-term", "lj-iosevka-fcmono", "lj-iosevka-aile", "lj-iosevka-etoile"]

